# PIU IO Bridge - Linux Key Mapping Configuration
# Key names use Linux evdev names (KEY_Q, KEY_KP7, KEY_ESC, etc.)
# List all: python3 -c "from evdev import ecodes; [print(k) for k in sorted(dir(ecodes)) if k.startswith('KEY_')]"
#
# PIU pad layout:
#   7(UL)  9(UR)
#      5(CENTER)
#   1(DL)  3(DR)

[keymap]
# Player 1 (QESZC layout)
MAP_1P_7=KEY_Q
MAP_1P_9=KEY_E
MAP_1P_5=KEY_S
MAP_1P_1=KEY_Z
MAP_1P_3=KEY_C

# Player 2 (Numpad 79513 layout)
MAP_2P_7=KEY_KP7
MAP_2P_9=KEY_KP9
MAP_2P_5=KEY_KP5
MAP_2P_1=KEY_KP1
MAP_2P_3=KEY_KP3

# Cabinet
MAP_CONFIG=KEY_F1
MAP_SERVICE=KEY_ENTER
